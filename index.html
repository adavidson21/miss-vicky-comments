<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Miss Vicky's Classroom Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --purple:      #7c5cbf;
      --purple-dark: #5a3d9a;
      --purple-light:#ede8f8;
      --amber:       #e8963a;
      --cream:       #f7f4fc;
      --white:       #ffffff;
      --text:        #222222;
      --muted:       #666666;
      --border:      #ddd4ef;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    .site-header {
      background: var(--purple-dark);
      color: white;
      padding: 40px 20px 36px;
      text-align: center;
    }

    .site-header h1 {
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .site-header p {
      margin-top: 8px;
      font-size: 1rem;
      opacity: 0.85;
    }

    .main {
      max-width: 520px;
      margin: 0 auto;
      padding: 36px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .tool-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--white);
      border-radius: 18px;
      padding: 26px 24px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.08);
      text-decoration: none;
      color: var(--text);
      border: 2px solid transparent;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .tool-card:hover, .tool-card:active {
      border-color: var(--purple);
      box-shadow: 0 4px 20px rgba(124,92,191,0.18);
      transform: translateY(-2px);
    }

    .tool-icon {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .tool-icon svg {
      width: 30px;
      height: 30px;
    }

    .tool-icon-purple { background: var(--purple-light); }
    .tool-icon-amber  { background: #fef6e8; }

    .tool-info { flex: 1; }

    .tool-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--purple-dark);
      margin-bottom: 4px;
    }

    .tool-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .tool-arrow {
      color: var(--border);
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 0 4px;
    }
  </style>
</head>
<body>

<div class="site-header">
  <h1>Miss Vicky's Classroom Hub</h1>
  <p>Tools for the Bright Starters Classroom</p>
</div>

<div class="main">

  <div class="section-label">Tools</div>

  <a href="comments.html" class="tool-card">
    <div class="tool-icon tool-icon-purple">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a3d9a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <div class="tool-info">
      <div class="tool-title">Comment Generator</div>
      <div class="tool-desc">Build personalized report comments for each student and download as a Word doc.</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

  <a href="open-house.html" class="tool-card">
    <div class="tool-icon tool-icon-amber">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e8963a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="tool-info">
      <div class="tool-title">Open House Letter</div>
      <div class="tool-desc">Customize and download the Open House welcome letter for families.</div>
    </div>
    <div class="tool-arrow">›</div>
  </a>

</div>

</body>
</html>
